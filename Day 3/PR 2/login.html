<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameStore - Account</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212; /* Dark theme background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        .auth-container {
            background-color: #1e1e1e;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-top: 5px solid #d57454;
        }

        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin: 0 15px;
            padding-bottom: 5px;
            transition: 0.3s;
        }

        .tab-btn.active {
            color: #d57454;
            border-bottom: 2px solid #d57454;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #bbb;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #333;
            background: #2a2a2a;
            color: #fff;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: #d57454;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #d57454;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #bf5f40;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #777;
        }

        .footer-text a {
            color: #d57454;
            text-decoration: none;
        }

        #signup-form {
            display: none;
        }
.social-login {
    margin-top: 25px;
    border-top: 1px solid #333;
    padding-top: 20px;
    text-align: center;
}

.social-login p {
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 15px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.social-btns {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.social-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    border-radius: 5px;
    text-decoration: none;
    font-weight: bold;
    font-size: 0.9rem;
    transition: 0.3s;
}

.google-btn {
    background-color: #ffffff;
    color: #000;
}

.google-btn:hover {
    background-color: #f1f1f1;
}

.fb-btn {
    background-color: #1877F2;
    color: white;
}

.fb-btn:hover {
    background-color: #166fe5;
}

.social-icon {
    width: 18px;
    height: 18px;
    margin-right: 10px;
}
.category-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
}

.cat-pill input[type="checkbox"] {
    display: none;
}

.cat-pill {
    cursor: pointer;
    background-color: #2a2a2a;
    border: 1px solid #444;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 0.85rem;
    color: #ccc;
    display: flex;
    align-items: center;
    transition: all 0.3s ease;
}

.cat-pill:hover {
    background-color: #333;
    border-color: #d57454;
}

.cat-pill input[type="checkbox"]:checked + span {
    color: #fff;
}

.cat-pill input[type="checkbox"]:checked + .pill-bg {
    background-color: #d57454;
    border-color: #d57454;
    box-shadow: 0 0 10px rgba(213, 116, 84, 0.4);
}

.cat-pill {
    position: relative;
}
    </style>
</head>
<body>

<div class="auth-container">
    <div class="tabs">
        <button id="login-tab" class="tab-btn active" onclick="showForm('login')">Login</button>
        <button id="signup-tab" class="tab-btn" onclick="showForm('signup')">Sign Up</button>
    </div>

    <form id="login-form">
        <div class="form-group">
            <label>Email or Username</label>
            <input type="text" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-submit">Sign In</button>
        <div class="social-login">
        <p>Or continue with</p>
        <div class="social-btns">
            <a href="#" class="social-btn google-btn">
                <img src="https://www.svgrepo.com/show/355037/google.svg" class="social-icon" alt="Google">
                Login with Google
            </a>
            <a href="#" class="social-btn fb-btn">
                <img src="https://www.svgrepo.com/show/448224/facebook.svg" class="social-icon" alt="FB">
                Login with Facebook
            </a>
        </div>
    </div>
        <p class="footer-text"><a href="#">Forgot password?</a></p>
    </form>
    <form id="signup-form">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="John Doe" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="john@example.com" required>
        </div>
        <div class="form-group">
            <label>MObile No.</label>
            <input type="number" placeholder="123-456-7890" required>
        </div>
        
        <div class="form-group">
            <label>Create Password</label>
            <input type="password" placeholder="••••••••" required>
        </div>
        <div class="form-group">
    <label>Choose Your Interests</label>
    <div class="category-pills">
        <label class="cat-pill">
            <input type="checkbox" name="category" value="battle-royal">
            <span class="pill-bg">🔥 Battle Royale</span>
        </label>

        <label class="cat-pill">
            <input type="checkbox" name="category" value="puzzle">
            <span class="pill-bg">🧩 Puzzle</span>
        </label>

        <label class="cat-pill">
            <input type="checkbox" name="category" value="mind-games">
            <span class="pill-bg">🧠 Mind Games</span>
        </label>

        <label class="cat-pill">
            <input type="checkbox" name="category" value="shooter">
            <span class="pill-bg">🔫 Shooter</span>
        </label>

        <label class="cat-pill">
            <input type="checkbox" name="category" value="action">
            <span class="pill-bg">⚔️ Action</span>
        </label>
    </div>
        <button type="submit" class="btn-submit">Create Account</button>
    <div class="social-login">
        <p>Or continue with</p>
        <div class="social-btns">
            <a href="#" class="social-btn google-btn">
                <img src="https://www.svgrepo.com/show/355037/google.svg" class="social-icon" alt="Google">
                Login with Google
            </a>
            <a href="#" class="social-btn fb-btn">
                <img src="https://www.svgrepo.com/show/448224/facebook.svg" class="social-icon" alt="FB">
                Login with Facebook
            </a>
        </div>
    </div>
    
</div>
    </form>


</div>

<script>
    function showForm(type) {
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const loginTab = document.getElementById('login-tab');
        const signupTab = document.getElementById('signup-tab');

        if (type === 'login') {
            loginForm.style.display = 'block';
            signupForm.style.display = 'none';
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
        } else {
            loginForm.style.display = 'none';
            signupForm.style.display = 'block';
            loginTab.classList.remove('active');
            signupTab.classList.add('active');
        }
    }
</script>

</body>
</html>
