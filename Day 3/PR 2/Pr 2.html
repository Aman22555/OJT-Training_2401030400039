<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameStore - Home</title>
<body>
   <style>
    body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff
        }
    header {
        display: flex;
        align-items: center; 
        justify-content: space-between; 
        padding: 10px 5%;
        background-color: #d57454;
        color: rgb(94, 75, 218);
        font-family: sans-serif;
    }

    nav {
        display: flex;
        align-items: center;
    }

    #logo img {
        height: 40px;
        margin-right: 20px;
    }

    nav ul {
        display: flex;
        list-style: none;
        margin: 0;
        padding: 0;
    }

    nav ul li {
        margin: 0 15px;
    }

    nav ul li a {
        color: white;
        text-decoration: none;
        font-weight: bold;
    }
    .basic-slider {
        display: flex;
        width: 100%;
        max-width: 1100px;
        height: 400px;
        margin: 30px auto;
        overflow-x: auto;
        scroll-snap-type: x mandatory; 
        scroll-behavior: smooth;
        
        border-radius: 15px;
        border: 4px solid #e67e41;
    }
    .snap-slide {
        min-width: 100%;
        height: 100%;
        scroll-snap-align: start; 
        position: relative;
    }

    .snap-slide img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .label {
        position: absolute;
        bottom: 20px;
        left: 20px;
        background: hsl(10, 80%, 54%);
        color: white;
        padding: 8px 15px;
        font-family: sans-serif;
        font-weight: bold;
        border-radius: 5px;
    }
    .basic-slider::-webkit-scrollbar {
        display: none;
    }
    .basic-slider {
        -ms-overflow-style: none;  
        scrollbar-width: none;  
    }
    .game-info-section {
        max-width: 1100px;
        margin: 40px auto;
        padding: 0 20px;
        font-family: sans-serif;
    }

    .game-info-section h2 {
        color: #333;
        border-left: 5px solid #d57454;
        padding-left: 15px;
        margin-bottom: 20px;
    }

    .game-table {
        width: 100%;
        border-collapse: collapse;
        background-color: rgb(255, 255, 255);
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .game-table thead {
        background-color: #d57454;
        color: white;
    }

    .game-table th, .game-table td {
        padding: 15px;
        text-align: left;
        border-bottom: 1px solid #ddd;
    }

    .game-table tbody tr:hover {
        background-color: #f9f9f9;
    }
    .game-table tbody tr {
    cursor: pointer;
}

    .status-online {
        color: green;
        font-weight: bold;
    }

    .status-offline {
        color: #666;
        font-style: italic;
    }
.search-box {
    display: flex;
    align-items: center;
    background: rgba(255, 255, 255, 0.15); 
    border-radius: 20px;
    padding: 5px 15px;
    border: 1px solid rgba(255, 255, 255, 0.3);
    transition: all 0.3s ease;
}

.search-box:focus-within {
    background: rgba(255, 255, 255, 0.25);
    border-color: white;
}

.search-box input {
    background: transparent;
    border: none;
    outline: none;
    color: white;
    padding: 5px;
    font-size: 14px;
}

/* Placeholder color */
.search-box input::placeholder {
    color: rgba(255, 255, 255, 0.7);
}

.search-box button {
    background: transparent;
    border: none;
    color: white;
    cursor: pointer;
    font-weight: bold;
    margin-left: 10px;
    padding: 5px 10px;
    text-transform: uppercase;
    font-size: 12px;
}

/* --- Login Button --- */
.login-btn {
    background-color: white;
    color: #d57454; 
    border: none;
    padding: 8px 25px;
    border-radius: 20px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s, background-color 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.login-btn:hover {
    background-color: #f0f0f0;
    transform: scale(1.05);
}

.login-btn:active {
    transform: scale(0.95);
}
:root {
    --primary-glow: #ff4655; 
    --secondary-glow: #00f2ff; 
    --bg-dark: #0f1214;
    --card-bg: #1a1d20;
    --text-main: #ffffff;
    --accent: #d57454;
}

body {
    background-color: var(--bg-dark);
    color: var(--text-main);
    font-family: 'Rajdhani', 'Segoe UI', sans-serif; 
    line-height: 1.6;
}

header {
    background: linear-gradient(90deg, #121212 0%, #252525 100%);
    border-bottom: 2px solid var(--accent);
    box-shadow: 0 0 15px rgba(213, 116, 84, 0.3);
    padding: 15px 5%;
}

nav ul li a {
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: 0.3s;
}

nav ul li a:hover {
    color: var(--accent);
    text-shadow: 0 0 8px var(--accent);
}

.search-box input {
    background: #2a2a2a;
    border: 1px solid #444;
    color: white;
    padding: 8px 15px;
    border-radius: 4px 0 0 4px;
}

.search-box button, .login-btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 20px;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
    clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); 
    transition: 0.3s;
}

.search-box button:hover, .login-btn:hover {
    filter: brightness(1.2);
    transform: scale(1.05);
}

.basic-slider {
    border: 2px solid #333;
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
    position: relative;
}

.label {
    background: rgba(213, 116, 84, 0.9);
    backdrop-filter: blur(5px);
    border-left: 5px solid white;
    text-transform: uppercase;
    font-size: 1.2rem;
}

.game-info-section h2 {
    color: var(--text-main);
    text-transform: uppercase;
    letter-spacing: 2px;
}

.game-table {
    background-color: var(--card-bg);
    border: 1px solid #333;
    color: #ccc;
}

.game-table thead {
    background: #252525;
}

.game-table th {
    color: var(--accent);
    text-transform: uppercase;
    font-size: 0.8rem;
}

.game-table td {
    border-bottom: 1px solid #2a2a2a;
}

.game-table tbody tr:hover {
    background-color: #25282c;
    box-shadow: inset 5px 0 0 var(--accent);
}

::-webkit-scrollbar {
    width: 8px;
}
::-webkit-scrollbar-track {
    background: #0f1214;
}
::-webkit-scrollbar-thumb {
    background: var(--accent);
    border-radius: 10px;
}
</style>
