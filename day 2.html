<html>
<head>
<title>Shop now</title>
</head>
<body>
   <style>
    header {
        display: flex;
        align-items: center; 
        justify-content: space-between; 
        padding: 10px 5%;
        background-color: #d57454;
        color: rgb(94, 75, 218);
        font-family: sans-serif;
    }

    nav {
        display: flex;
        align-items: center;
    }

    #logo img {
        height: 40px;
        margin-right: 20px;
    }

    nav ul {
        display: flex;
        list-style: none;
        margin: 0;
        padding: 0;
    }

    nav ul li {
        margin: 0 15px;
    }

    nav ul li a {
        color: white;
        text-decoration: none;
        font-weight: bold;
    }
    .basic-slider {
        display: flex;
        width: 100%;
        max-width: 1100px;
        height: 400px;
        margin: 30px auto;
        overflow-x: auto;
        scroll-snap-type: x mandatory; 
        scroll-behavior: smooth;
        
        border-radius: 15px;
        border: 4px solid #0c0c0c;
    }
    .snap-slide {
        min-width: 100%;
        height: 100%;
        scroll-snap-align: start; 
        position: relative;
    }

    .snap-slide img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .label {
        position: absolute;
        bottom: 20px;
        left: 20px;
        background: hsl(10, 80%, 54%);
        color: white;
        padding: 8px 15px;
        font-family: sans-serif;
        font-weight: bold;
        border-radius: 5px;
    }
    .basic-slider::-webkit-scrollbar {
        display: none;
    }
    .basic-slider {
        -ms-overflow-style: none;  
        scrollbar-width: none;  
    }
</style>
    <header>

    <div class="search-box">
        <input type="text" placeholder="Search products">
        <button>Search</button>
    </div>
</header>
